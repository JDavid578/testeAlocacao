<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ocUPE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>ocUPE - Alocação de salas</h1>
        <h6>Showcase simples by Jam e grupo</h6>
    </header>

    <div class="container">
        <div id="tela-inicial" class="tela ativa">
            <h2>Selecione quem você é:</h2>
            <div class="botoes">
                <button class="btn-azul" onclick="mudarTela('tela-aluno')">Aluno</button>
                <button class="btn-branco" onclick="mudarTela('tela-admin'); atualizarAdmin();">Admin</button>
            </div>
        </div>

        <div id="tela-aluno" class="tela">
            <div class="cabecalho-tela">
                <h2>Pedir Sala</h2>
                <button class="btn-branco" onclick="mudarTela('tela-inicial')">Voltar</button>
            </div>
            
            <form id="form-sala" onsubmit="mandarPedido(event)">
                <label>Nome Completo</label>
                <input type="text" id="nome" required>
                
                <label>Curso</label>
                <input type="text" id="curso" required>

                <label>Prédio</label>
                <select id="predio" required onchange="montarSalas()">
                    <option value="">Escolha...</option>
                    <option value="Prédio A">Prédio A</option>
                    <option value="Prédio B">Prédio B</option>
                    <option value="Prédio C">Prédio C</option>
                    <option value="Prédio D">Prédio D</option>
                    <option value="Prédio E">Prédio E</option>
                </select>

                <label>Sala</label>
                <select id="sala" required disabled>
                    <option value="">Escolha o prédio antes</option>
                </select>

                <label>Data</label>
                <input type="date" id="data" required>

                <div class="lado-a-lado">
                    <div>
                        <label>Início</label>
                        <input type="time" id="hora-inicio" required>
                    </div>
                    <div>
                        <label>Fim</label>
                        <input type="time" id="hora-fim" required>
                    </div>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="recorrente">
                    <label>Toda semana</label>
                </div>

                <button type="submit" class="btn-azul btn-largo">Mandar Solicitação</button>
            </form>
        </div>

        <div id="tela-admin" class="tela">
            <div class="cabecalho-tela">
                <h2>Painel Admin</h2>
                <button class="btn-branco" onclick="mudarTela('tela-inicial')">Sair</button>
            </div>

            <div class="duas-colunas">
                <div class="coluna">
                    <h3>Aguardando</h3>
                    <div id="lista-espera"></div>
                </div>

                <div class="coluna">
                    <h3>Já Alocadas</h3>
                    <div id="lista-prontas"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
